spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
    gateway:
      routes:
        - id: auth
          uri: http://localhost:9001
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
        - id: base
          uri: http://localhost:9003
          predicates:
            - Path=/api/base/**
          filters:
            - StripPrefix=2

  data:
    redis:
      host: localhost
      port: 6379
      password: Redis@123456
      database: 0
      timeout: 5000ms

server:
  port: 9002

# JWT 配置（与 auth 服务保持一致）
jwt:
  secret: dana-gpdemo-jwt-secret-key-2026-must-be-at-least-256-bits-long

# 白名单路径（不需要鉴权）
gateway:
  auth:
    white-list:
      - /api/auth/login
      - /api/auth/logout
